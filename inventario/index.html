<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario — LIFE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0e0c;
    --surface:   #161614;
    --surface2:  #1e1e1b;
    --border:    #2a2a26;
    --text:      #e8e4da;
    --muted:     #6b6860;
    --accent:    #8fb87a;
    --accent2:   #c4a96b;
    --red:       #c46b6b;
    --sidebar-w: 72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
  }

  .sidebar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.15em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    margin-bottom: 2rem;
    text-decoration: none;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    flex: 1;
  }

  .nav-item {
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    color: var(--muted);
    text-decoration: none;
    position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface2); color: var(--accent); }
  .nav-item svg { width: 20px; height: 20px; }

  .nav-tooltip {
    position: absolute;
    left: calc(100% + 12px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .nav-item:hover .nav-tooltip { opacity: 1; }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    padding: 1.5rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
  }

  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text);
    flex: 1;
    min-width: 120px;
  }
  .topbar-title span { color: var(--accent); }

  .filter-tabs {
    display: flex;
    gap: 0.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.2rem;
  }
  .filter-tab {
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: var(--muted);
    border: none;
    background: none;
    font-family: 'DM Mono', monospace;
    transition: background 0.15s, color 0.15s;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { background: var(--surface2); color: var(--accent); }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    color: var(--muted);
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-refresh:hover { color: var(--text); border-color: var(--text); }
  .btn-refresh svg { width: 13px; height: 13px; }
  .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── COTIZACION BAR ── */
  .cotizacion-bar {
    padding: 0.9rem 2.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .cotizacion-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .cotizacion-input-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    transition: border-color 0.15s;
  }
  .cotizacion-input-wrap:focus-within { border-color: var(--accent); }

  .cotizacion-prefix {
    font-size: 0.7rem;
    color: var(--muted);
  }

  #cotizacion-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    width: 90px;
    text-align: right;
  }

  .cotizacion-suffix {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .cotizacion-note {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .cotizacion-note strong { color: var(--accent2); }

  /* ── CONTENT ── */
  .content {
    padding: 2rem 2.5rem;
    flex: 1;
  }

  /* ── CARDS ── */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .card {
    background: var(--surface);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
  }
  .card-value .currency { font-size: 1rem; color: var(--muted); margin-right: 0.15em; }

  .card-sub {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.25rem;
    line-height: 1.6;
  }
  .card-sub strong { color: var(--accent2); }

  .card-accent { border-top: 2px solid var(--accent); }
  .card-jd     { border-top: 2px solid #7aa3b8; }
  .card-pinki  { border-top: 2px solid #b87ab0; }

  .split-row {
    display: flex;
    gap: 1rem;
    margin-top: 0.5rem;
  }
  .split-item { flex: 1; }
  .split-name {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }
  .split-value {
    font-size: 1rem;
    color: var(--text);
  }

  /* ── TABLE SECTION ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .section-title {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .section-count {
    font-size: 0.62rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1300px;
  }

  thead th {
    padding: 0.6rem 0.9rem;
    text-align: left;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    font-weight: 400;
    background: var(--surface);
  }
  thead th.right { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }

  td {
    padding: 0.75rem 0.9rem;
    font-size: 0.75rem;
    color: var(--text);
    vertical-align: middle;
  }
  td.right { text-align: right; font-variant-numeric: tabular-nums; }
  td.muted  { color: var(--muted); }

  .td-desc {
    font-size: 0.8rem;
    max-width: 200px;
  }

  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid;
    white-space: nowrap;
  }
  .badge-activo    { color: var(--accent); border-color: rgba(143,184,122,0.3); background: rgba(143,184,122,0.07); }
  .badge-vendido   { color: var(--accent2); border-color: rgba(196,169,107,0.3); background: rgba(196,169,107,0.07); }
  .badge-donado    { color: #7aa3b8; border-color: rgba(122,163,184,0.3); background: rgba(122,163,184,0.07); }
  .badge-desechado { color: var(--muted); border-color: var(--border); background: transparent; }

  .btn-delete {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    padding: 0.2rem 0.4rem;
    font-size: 0.7rem;
    transition: color 0.15s, border-color 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .btn-delete:hover { color: var(--red); border-color: rgba(196,107,107,0.4); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.75rem; letter-spacing: 0.05em; }

  /* ── ERROR / LOADING ── */
  .status-bar {
    padding: 0.6rem 2.5rem;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    display: none;
  }
  .status-bar.loading { display: block; color: var(--muted); }
  .status-bar.error   { display: block; color: var(--red); }

  /* ── APPSHEET DRAWER ── */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: #0e0e0c;
    border: none;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(143,184,122,0.3);
    z-index: 200;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(143,184,122,0.4); }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 210;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 420px;
    max-width: calc(100vw - var(--sidebar-w) - 1rem);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 220;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-title {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .drawer-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem;
    transition: color 0.15s;
  }
  .drawer-close:hover { color: var(--text); }

  .drawer-body { flex: 1; overflow: hidden; }

  .appsheet-frame {
    flex: 1;
    border: none;
    width: 100%;
    height: 100%;
    display: block;
    background: #fff;
  }

  .drawer-no-url {
    padding: 2rem;
    color: var(--muted);
    font-size: 0.72rem;
    line-height: 1.8;
    letter-spacing: 0.03em;
  }
  .drawer-no-url code {
    color: var(--accent);
    background: var(--surface2);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cards-row { animation: fadeUp 0.4s ease both; }
  .table-wrap { animation: fadeUp 0.4s 0.1s ease both; }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<nav class="sidebar">
  <a href="../index.html" class="sidebar-logo">LIFE</a>

  <div class="sidebar-nav">
    <!-- Home -->
    <a href="../index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

    <a href="../finanzas/index.html" class="nav-item">

    <!-- Inventario (active) -->
    <a href="index.html" class="nav-item active">

        <path d="m3.3 7 8.7 5 8.7-5M12 22V12"/>
      </svg>
      <span class="nav-tooltip">Inventario</span>
    </a>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">Inventario <span>/ bienes</span></div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('Activo')">Activos</button>
      <button class="filter-tab" onclick="setFilter('Vendido')">Vendidos</button>
      <button class="filter-tab" onclick="setFilter('Donado')">Donados</button>
      <button class="filter-tab" onclick="setFilter('Desechado')">Desechados</button>
      <button class="filter-tab" onclick="setFilter('todos')">Todos</button>
    </div>

    <div class="topbar-actions">
      <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Actualizar
      </button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar" id="status-bar"></div>

  <!-- COTIZACION BAR -->
  <div class="cotizacion-bar">
    <span class="cotizacion-label">Cotización USD hoy</span>
    <div class="cotizacion-input-wrap">
      <span class="cotizacion-prefix">$</span>
      <input type="number" id="cotizacion-input" value="1200" min="1" step="1" oninput="onCotizacionChange(this.value)">
      <span class="cotizacion-suffix">ARS / USD</span>
    </div>
    <span class="cotizacion-note" id="cotizacion-note">
      Actualizá la cotizacion para recalcular los valores en pesos de hoy.
    </span>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- CARDS -->
    <div class="cards-row" id="cards-row">
      <div class="card card-accent">
        <div class="card-label">Inventario total (USD)</div>
        <div class="card-value" id="card-total-usd"><span class="currency">U$D</span>—</div>
        <div class="card-sub" id="card-total-ars">—</div>
      </div>

      <div class="card card-jd">
        <div class="card-label">JD</div>
        <div class="card-value" id="card-jd-usd"><span class="currency">U$D</span>—</div>
        <div class="card-sub" id="card-jd-ars">—</div>
      </div>

      <div class="card card-pinki">
        <div class="card-label">Pinki</div>
        <div class="card-value" id="card-pinki-usd"><span class="currency">U$D</span>—</div>
        <div class="card-sub" id="card-pinki-ars">—</div>
      </div>

      <div class="card">
        <div class="card-label">Ítems activos</div>
        <div class="card-value" id="card-count">—</div>
        <div class="card-sub" id="card-count-note">bienes en inventario</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="section-header">
      <span class="section-title">Bienes</span>
      <span class="section-count" id="table-count"></span>
      <div class="section-line"></div>
    </div>

    <div class="table-wrap" id="table-wrap">
      <div class="empty-state">
        <div class="empty-icon">◻</div>
        <p>Cargando datos...</p>
      </div>
    </div>

  </div><!-- /content -->
</main>

<!-- ═══ APPSHEET DRAWER ═══ -->
<button class="fab" id="fab" onclick="openDrawer()" title="Agregar bien">+</button>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Agregar bien</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURACION
// ═══════════════════════════════════════════════════════════════

const API_URL      = 'https://script.google.com/macros/s/AKfycbyWLtYp4G98Bn3jJna6bwqjyH_Pc9zg371S_xQfW0iDVZ1FQckvXl9fWtrELwTgeGry/exec';
const APPSHEET_URL = 'https://www.appsheet.com/start/a80bcfb2-256e-48a8-8ed1-ae1f458b8025';

// ═══════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════

const S = {
  items:      [],
  filter:     'Activo',
  cotizacion: 1200,
};

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

async function init() {
  await loadData();
}

// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════

async function loadData() {
  if (!API_URL) {
    setStatus('error', 'API_URL no configurada. Pegar la URL del deployment en la constante API_URL.');
    renderTable([]);
    return;
  }

  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  setStatus('loading', 'Cargando inventario...');

  try {
    const res = await fetch(API_URL + '?action=inventario');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');

    S.items = json.data || [];
    setStatus('', '');
    render();
  } catch (err) {
    setStatus('error', 'Error al cargar datos: ' + err.message);
    renderTable([]);
  } finally {
    btn.classList.remove('spinning');
  }
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  const filtered = S.filter === 'todos'
    ? S.items
    : S.items.filter(i => (i.estado || 'Activo') === S.filter);

  renderCards(filtered);
  renderTable(filtered);
  document.getElementById('table-count').textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');
}

function usdCompra(item) {
  // precio_usd_compra no se calcula automáticamente en Apps Script,
  // así que lo derivamos en el frontend: precio_ars / cotizacion_usd_compra
  const fromField = parseFloat(item.precio_usd_compra);
  if (fromField && fromField > 0) return fromField;
  const ars = parseFloat(item.precio_ars);
  const cot = parseFloat(item.cotizacion_usd_compra);
  return (ars > 0 && cot > 0) ? ars / cot : 0;
}

function renderCards(items) {
  const cotHoy = S.cotizacion || 1;

  const totalUSD = items.reduce((s, i) => s + usdCompra(i), 0);

  const jdUSD = items.reduce((s, i) => {
    const pct = parseFloat(i.proporcion_jd);
    return s + usdCompra(i) * (isNaN(pct) ? 0.5 : pct / 100);
  }, 0);

  const pinkiUSD = totalUSD - jdUSD;
  const activos  = items.filter(i => (i.estado || 'Activo') === 'Activo').length;

  document.getElementById('card-total-usd').innerHTML = `<span class="currency">U$D</span>${fmtUSD(totalUSD)}`;
  document.getElementById('card-total-ars').innerHTML  = `≈ <strong>${fmtARS(totalUSD * cotHoy)}</strong> ARS hoy`;

  document.getElementById('card-jd-usd').innerHTML = `<span class="currency">U$D</span>${fmtUSD(jdUSD)}`;
  document.getElementById('card-jd-ars').innerHTML  = `≈ <strong>${fmtARS(jdUSD * cotHoy)}</strong> ARS hoy`;

  document.getElementById('card-pinki-usd').innerHTML = `<span class="currency">U$D</span>${fmtUSD(pinkiUSD)}`;
  document.getElementById('card-pinki-ars').innerHTML  = `≈ <strong>${fmtARS(pinkiUSD * cotHoy)}</strong> ARS hoy`;

  document.getElementById('card-count').textContent = activos;
  document.getElementById('card-count-note').textContent =
    activos === 1 ? 'bien activo' : 'bienes activos';
}

function renderTable(items) {
  const wrap = document.getElementById('table-wrap');

  if (!items.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◻</div>
        <p>${S.items.length === 0 ? 'No hay bienes registrados aún. Usá el botón + para agregar.' : 'No hay bienes en este estado.'}</p>
      </div>`;
    return;
  }

  const cotHoy = S.cotizacion || 1;

  const rows = items.map(i => {
    const ars        = parseFloat(i.precio_ars) || 0;
    const cotCompra  = parseFloat(i.cotizacion_usd_compra) || 0;
    const usd        = usdCompra(i);
    const pct        = parseFloat(i.proporcion_jd);
    const pctJD      = isNaN(pct) ? 50 : pct;
    const pctPinki   = 100 - pctJD;
    const arsJD      = ars * pctJD / 100;
    const arsPinki   = ars * pctPinki / 100;
    const ventaJD    = usd * cotHoy * pctJD / 100;
    const ventaPinki = usd * cotHoy * pctPinki / 100;

    return `
      <tr>
        <td class="td-desc">${escHtml(i.descripcion || '—')}</td>
        <td class="muted">${escHtml(i.categoria || '—')}</td>
        <td class="muted">${i.fecha_compra ? i.fecha_compra.substring(0, 7) : '—'}</td>
        <td class="right">${ars ? fmtARS(ars) : '—'}</td>
        <td class="right muted">${cotCompra ? fmtARS(cotCompra) : '—'}</td>
        <td class="right">${usd ? 'U$D ' + fmtUSD(usd) : '—'}</td>
        <td class="right muted">${pctJD}%</td>
        <td class="right muted">${pctPinki}%</td>
        <td class="right" style="color:#7aa3b8">${arsJD ? fmtARS(arsJD) : '—'}</td>
        <td class="right" style="color:#b87ab0">${arsPinki ? fmtARS(arsPinki) : '—'}</td>
        <td class="right" style="color:var(--accent2)">
          <input type="number" class="cot-inline" value="${cotHoy}" min="1" step="1"
            oninput="onCotizacionChange(this.value)"
            style="width:72px;background:transparent;border:none;border-bottom:1px solid var(--border);
                   color:var(--accent2);font-family:inherit;font-size:0.75rem;text-align:right;
                   outline:none;padding:0 2px;">
        </td>
        <td class="right" style="color:#7aa3b8">${ventaJD ? fmtARS(ventaJD) : '—'}</td>
        <td class="right" style="color:#b87ab0">${ventaPinki ? fmtARS(ventaPinki) : '—'}</td>
        <td><span class="badge badge-${(i.estado||'activo').toLowerCase()}">${i.estado || 'Activo'}</span></td>
        <td>
          <button class="btn-delete" onclick="confirmDelete('${escAttr(i.id)}', '${escAttr(i.descripcion || '')}')">
            borrar
          </button>
        </td>
      </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Fecha</th>
          <th class="right">ARS pagado</th>
          <th class="right">Cot. compra</th>
          <th class="right">USD compra</th>
          <th class="right">% JD</th>
          <th class="right">% Pinki</th>
          <th class="right">ARS JD</th>
          <th class="right">ARS Pinki</th>
          <th class="right">Cot. hoy</th>
          <th class="right">Venta JD</th>
          <th class="right">Venta Pinki</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ═══════════════════════════════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════════════════════════════

function setFilter(f) {
  S.filter = f;
  document.querySelectorAll('.filter-tab').forEach(btn => {
    const target = btn.textContent.trim().toLowerCase();
    const map = { activos: 'Activo', vendidos: 'Vendido', donados: 'Donado', desechados: 'Desechado', todos: 'todos' };
    btn.classList.toggle('active', map[target] === f);
  });
  render();
}

function onCotizacionChange(val) {
  // Acepta valor desde el input global (arriba) o desde cualquier input de la tabla
  const n = parseFloat(val !== undefined ? val : document.getElementById('cotizacion-input').value);
  if (!isNaN(n) && n > 0) {
    S.cotizacion = n;
    // Sincroniza el input global si el cambio vino de la tabla
    const globalInput = document.getElementById('cotizacion-input');
    if (parseFloat(globalInput.value) !== n) globalInput.value = n;
    render();
  }
}

async function confirmDelete(id, desc) {
  if (!confirm(`Borrar "${desc}"?\nEsta acción marca el ítem como borrado en la Sheet.`)) return;
  await deleteItem(id);
}

async function deleteItem(id) {
  if (!API_URL) return;
  try {
    const res  = await fetch(`${API_URL}?action=delete&id=${encodeURIComponent(id)}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    S.items = S.items.filter(i => i.id !== id);
    render();
  } catch (err) {
    alert('Error al borrar: ' + err.message);
  }
}

// ═══════════════════════════════════════════════════════════════
// APPSHEET DRAWER
// ═══════════════════════════════════════════════════════════════

function openDrawer() {
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('drawer-overlay');
  const body    = document.getElementById('drawer-body');

  // Carga el iframe la primera vez que se abre (lazy), igual que finanzas
  if (APPSHEET_URL) {
    if (!body.querySelector('iframe')) {
      const iframe = document.createElement('iframe');
      iframe.className = 'appsheet-frame';
      iframe.src       = APPSHEET_URL;
      iframe.allow     = 'camera; microphone';
      body.appendChild(iframe);
    }
  } else {
    if (!body.querySelector('.drawer-no-url')) {
      body.innerHTML = `
        <div class="drawer-no-url">
          Configurá la constante <code>APPSHEET_URL</code> en el código del dashboard
          para habilitar la carga de bienes desde AppSheet.
        </div>`;
    }
  }

  drawer.classList.add('open');
  overlay.classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.className = 'status-bar' + (type ? ' ' + type : '');
  bar.textContent = msg;
}

function fmtARS(n) {
  if (!n && n !== 0) return '—';
  return '$\u202f' + Math.round(n).toLocaleString('es-AR');
}

function fmtUSD(n) {
  if (!n && n !== 0) return '—';
  return n.toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

// ═══════════════════════════════════════════════════════════════
// ARRANQUE
// ═══════════════════════════════════════════════════════════════

init();
</script>
