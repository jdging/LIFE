<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras — LIFE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0e0c;
    --surface:   #161614;
    --surface2:  #1e1e1b;
    --border:    #2a2a26;
    --text:      #e8e4da;
    --muted:     #6b6860;
    --accent:    #8fb87a;
    --accent2:   #c4a96b;
    --red:       #c46b6b;
    --sidebar-w: 72px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
  }

  .sidebar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.15em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    margin-bottom: 2rem;
    text-decoration: none;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    flex: 1;
  }

  .nav-item {
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    color: var(--muted);
    text-decoration: none;
    position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface2); color: var(--accent); }
  .nav-item svg { width: 20px; height: 20px; }

  .nav-tooltip {
    position: absolute;
    left: calc(100% + 12px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .nav-item:hover .nav-tooltip { opacity: 1; }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
  }

  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text);
    flex: 1;
    min-width: 120px;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .btn-action {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    color: var(--muted);
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn-action:hover { color: var(--text); border-color: var(--text); }
  .btn-action.btn-send:hover  { color: var(--accent);  border-color: rgba(143,184,122,0.6); }
  .btn-action.btn-clean:hover { color: var(--red);     border-color: rgba(196,107,107,0.4); }

  /* ── CONTADOR STICKY ── */
  .counter-bar {
    padding: 0.6rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 57px; /* debajo del topbar */
    z-index: 40;
  }
  .counter-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .counter-urgent {
    color: var(--accent2);
  }

  /* ── STATUS BAR ── */
  .status-bar {
    padding: 0.6rem 2rem;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    display: none;
  }
  .status-bar.loading { display: block; color: var(--muted); }
  .status-bar.error   { display: block; color: var(--red); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 300;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── LISTA ── */
  .content {
    padding: 1.5rem 2rem;
    flex: 1;
  }

  /* Cada grupo de categoría */
  .cat-group {
    margin-bottom: 1.5rem;
  }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .cat-title {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .cat-count {
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.06em;
  }

  .cat-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Cada ítem de la lista */
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.65rem 0.75rem;
    border: 1px solid transparent;
    border-radius: 6px;
    margin-bottom: 0.25rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .item-row:hover { background: var(--surface); border-color: var(--border); }

  /* Ítem comprado: al fondo del grupo, tachado y opaco */
  .item-row.item-comprado {
    opacity: 0.35;
    order: 99; /* mover al fondo dentro del flex */
  }
  .item-row.item-comprado .item-nombre {
    text-decoration: line-through;
  }

  /* Checkbox personalizado */
  .item-check-wrap {
    padding-top: 0.1rem;
    flex-shrink: 0;
  }
  .item-check {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Zona central del ítem */
  .item-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .item-main {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .item-nombre {
    font-size: 0.82rem;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .item-cantidad {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* Badge urgente */
  .badge-urgente {
    display: inline-block;
    background: rgba(196,169,107,0.15);
    border: 1px solid rgba(196,169,107,0.4);
    color: var(--accent2);
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.1rem 0.4rem;
    border-radius: 20px;
    flex-shrink: 0;
  }

  /* Badge de origen (receta) */
  .badge-origen {
    display: inline-block;
    background: rgba(143,184,122,0.1);
    border: 1px solid rgba(143,184,122,0.3);
    color: var(--accent);
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    padding: 0.1rem 0.4rem;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .item-notas {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  /* Botón eliminar */
  .item-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.15rem 0.3rem;
    border-radius: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
    line-height: 1;
    font-family: 'DM Mono', monospace;
    align-self: flex-start;
    margin-top: 0.05rem;
  }
  .item-delete:hover { color: var(--red); }

  /* Grupos con flex y order para que comprados queden al fondo */
  .cat-items {
    display: flex;
    flex-direction: column;
  }

  /* Estado vacío */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.35; }
  .empty-state p { font-size: 0.75rem; letter-spacing: 0.05em; line-height: 1.8; }

  /* ── APPSHEET DRAWER ── */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: #0e0e0c;
    border: none;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(143,184,122,0.3);
    z-index: 200;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(143,184,122,0.4); }

  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 210;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 420px;
    max-width: calc(100vw - var(--sidebar-w) - 1rem);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 220;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-resize-handle {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 6px;
    cursor: col-resize;
    z-index: 10;
    border-radius: 3px 0 0 3px;
    transition: background 0.15s;
  }
  .drawer-resize-handle:hover,
  .drawer-resize-handle.dragging { background: var(--accent); opacity: 0.5; }

  .drawer-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-title {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .drawer-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem;
    transition: color 0.15s;
  }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { flex: 1; overflow: hidden; }

  .appsheet-frame {
    border: none;
    width: 100%;
    height: 100%;
    display: block;
    background: #fff;
  }

  .drawer-no-url {
    padding: 2rem;
    color: var(--muted);
    font-size: 0.72rem;
    line-height: 1.8;
    letter-spacing: 0.03em;
  }
  .drawer-no-url code {
    color: var(--accent);
    background: var(--surface2);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cat-group { animation: fadeUp 0.3s ease both; }

  @media (max-width: 600px) {
    .topbar { padding: 1rem 1rem; }
    .content { padding: 1rem 1rem; }
    .counter-bar { padding: 0.6rem 1rem; }
  }
</style>
</head>

<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-title">Lista del super</span>
    <div class="topbar-actions">
      <button class="btn-action btn-send" onclick="enviarLista()">Enviar lista 📧</button>
      <button class="btn-action btn-clean" onclick="limpiarComprados()">Limpiar comprados 🗑</button>

  <div class="counter-bar" id="counter-bar">

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURACIÓN
// ═══════════════════════════════════════════════════════════════

// TODO: pegar la URL del deployment de compras-api.js (Apps Script Web App)
const API_URL = 'https://script.google.com/macros/s/AKfycbz87O8QElO45XKClgLHM2pNF37BDonOqVcBbscab7zbssdTWVdkB6rQcrHnIVcHvRq6/exec';

// TODO: pegar la URL de la app AppSheet para carga de ítems (DEC-B3: misma app que Recetario)
const APPSHEET_URL = 'https://www.appsheet.com/start/b7057c3e-0c24-47ef-aa4f-8a054d107864';

// Orden de categorías optimizado para recorrer el super de corrido
const ORDEN_CATEGORIAS = ['Verduras', 'Carnes', 'Lácteos', 'Panadería',
                          'Almacén', 'Bebidas', 'Limpieza', 'Congelados', 
                          'Higiene personal', 'Perfumería/Cosmético', 'Fiambrería', 
                          'Mascotas', 'Frutas', 'Otro'];

// ═══════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════════

// S.items contiene todos los ítems del API (no borrados)
// Los cambios locales (marcarComprado) se aplican sobre S.items sin re-fetch
const S = {
  items:   [],
  loading: false,
};

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  if (!API_URL) {
    setStatus('error', 'Configurá la constante API_URL en el código del dashboard.');
    document.getElementById('lista-wrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚙</div>
        <p>Falta configurar <code>API_URL</code>.<br>Pegá la URL del deployment de compras-api.js.</p>
      </div>`;
    return;
  }
  fetchLista();
});

// ═══════════════════════════════════════════════════════════════
// FETCH Y RENDER
// ═══════════════════════════════════════════════════════════════

// === SECCIÓN: Carga de lista ===
// Qué hace: trae todos los ítems del API y los guarda en S.items, luego renderiza.
// Por qué: fetch al endpoint ?action=lista que devuelve ítems ordenados.
// Cómo funciona: setStatus loading → fetch → S.items = data → renderLista()
async function fetchLista() {
  if (S.loading) return;
  S.loading = true;
  setStatus('loading', 'Cargando lista…');

  try {
    const res  = await fetch(API_URL + '?action=lista');
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error del servidor');
    S.items = json.data || [];
    setStatus('');
    renderLista();
  } catch (err) {
    setStatus('error', 'Error al cargar la lista: ' + err.message);
  } finally {
    S.loading = false;
  }
}

// === SECCIÓN: Render de lista agrupada por categoría ===
// Qué hace: genera HTML agrupado por categoría en el orden del super.
// Por qué: la lista agrupada y ordenada reduce el tiempo de recorrido físico.
// Cómo funciona:
//   - Agrupa S.items por categoría
//   - Ordena categorías según ORDEN_CATEGORIAS
//   - Dentro de cada grupo: urgentes primero, luego nombre ASC
//   - Ítems comprados: al fondo del grupo con CSS order:99 y estilo tachado
function renderLista() {
  const wrap = document.getElementById('lista-wrap');

  // Separar pendientes y comprados
  const pendientes = S.items.filter(i => !esComprado(i) && !esBorrado(i));
  const comprados  = S.items.filter(i =>  esComprado(i) && !esBorrado(i));

  const urgentes = pendientes.filter(i => esUrgente(i));

  // Actualizar contador
  document.getElementById('counter-pendientes').textContent =
    pendientes.length + (pendientes.length === 1 ? ' ítem pendiente' : ' ítems pendientes');
  document.getElementById('counter-urgentes').textContent =
    urgentes.length > 0
      ? urgentes.length + (urgentes.length === 1 ? ' urgente' : ' urgentes')
      : 'sin urgentes';

  if (S.items.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✓</div>
        <p>La lista está vacía.<br>Tocá + para agregar ítems.</p>
      </div>`;
    return;
  }

  // Agrupar todos los ítems (pendientes + comprados) por categoría
  const grupos = {};
  ORDEN_CATEGORIAS.forEach(c => { grupos[c] = []; });

  S.items.filter(i => !esBorrado(i)).forEach(item => {
    const cat = ORDEN_CATEGORIAS.includes(item.categoria) ? item.categoria : 'Otro';
    grupos[cat].push(item);
  });

  // Construir HTML por grupo
  let html = '';
  ORDEN_CATEGORIAS.forEach(cat => {
    const items = grupos[cat];
    if (!items.length) return;

    // Dentro del grupo: urgentes pendientes primero, luego resto de pendientes, luego comprados
    const sorted = [...items].sort((a, b) => {
      const aComp = esComprado(a);
      const bComp = esComprado(b);
      if (aComp !== bComp) return aComp ? 1 : -1; // comprados al fondo

      const aUrg = esUrgente(a);
      const bUrg = esUrgente(b);
      if (aUrg !== bUrg) return aUrg ? -1 : 1;    // urgentes primero

      return String(a.nombre || '').localeCompare(String(b.nombre || ''));
    });

    const countPend = items.filter(i => !esComprado(i)).length;
    const countComp = items.filter(i =>  esComprado(i)).length;
    const countLabel = countPend > 0
      ? countPend + (countComp > 0 ? ' · ' + countComp + ' comprados' : '')
      : countComp + ' comprados';

    html += `<div class="cat-group">
      <div class="cat-header">
        <span class="cat-title">${cat}</span>
        <span class="cat-count">${countLabel}</span>
        <div class="cat-line"></div>
      </div>
      <div class="cat-items">
        ${sorted.map(item => renderItem(item)).join('')}
      </div>
    </div>`;
  });

  wrap.innerHTML = html;
}

// Genera el HTML de un ítem individual
function renderItem(item) {
  const comp    = esComprado(item);
  const urg     = esUrgente(item);
  const checked = comp ? 'checked' : '';

  const cant = parseFloat(item.cantidad) || 1;
  // Formatear cantidad: omitir ".0" si es entero
  const cantStr = Number.isInteger(cant) ? String(cant) : cant.toFixed(2).replace(/\.?0+$/, '');
  const unidad  = item.unidad || 'u';

  // Badge urgente solo en ítems pendientes
  const badgeUrg = (urg && !comp)
    ? '<span class="badge-urgente">urgente</span>'
    : '';

  // Badge de origen si no es 'manual'
  const origen   = item.origen && item.origen !== 'manual' ? item.origen : null;
  const badgeOri = origen
    ? `<span class="badge-origen">🍳 ${origen}</span>`
    : '';

  // Notas
  const notas = item.notas
    ? `<div class="item-notas">${escapeHtml(item.notas)}</div>`
    : '';

  return `<div class="item-row ${comp ? 'item-comprado' : ''}" data-id="${item.id}">
    <div class="item-check-wrap">
      <input type="checkbox" class="item-check"
        ${checked}
        onchange="marcarComprado('${item.id}', this)"
        ${comp ? 'disabled' : ''}>
    </div>
    <div class="item-body">
      <div class="item-main">
        <span class="item-nombre">${escapeHtml(item.nombre || '')}</span>
        <span class="item-cantidad">${cantStr} ${unidad}</span>
        ${badgeUrg}${badgeOri}
      </div>
      ${notas}
    </div>
    <button class="item-delete" onclick="borrarItem('${item.id}')" title="Eliminar">×</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════════════════════════════

// === SECCIÓN: Marcar comprado ===
// Qué hace: llama al endpoint comprado y actualiza S.items localmente sin re-fetch.
// Por qué: re-fetch completo es lento; actualizar local es inmediato y más fluido.
// Cómo funciona: checkbox.onchange → apiFetch → S.items[idx].estado = 'comprado' → renderLista()
async function marcarComprado(id, checkbox) {
  // Optimistic: deshabilitar checkbox mientras se procesa
  if (checkbox) checkbox.disabled = true;

  try {
    const json = await apiFetch('comprado', { id });
    if (!json.ok) throw new Error(json.error || 'Error del servidor');

    // Actualizar estado local sin re-fetch
    const idx = S.items.findIndex(i => i.id === id);
    if (idx !== -1) S.items[idx].estado = 'comprado';
    renderLista();
  } catch (err) {
    showToast('Error: ' + err.message);
    if (checkbox) { checkbox.checked = false; checkbox.disabled = false; }
  }
}

// === SECCIÓN: Borrar ítem ===
// Qué hace: soft delete con confirmación. Remueve el ítem de S.items y re-renderiza.
async function borrarItem(id) {
  const item = S.items.find(i => i.id === id);
  const nombre = item ? (item.nombre || id) : id;
  if (!confirm('¿Eliminar "' + nombre + '"?')) return;

  try {
    const json = await apiFetch('delete', { id });
    if (!json.ok) throw new Error(json.error || 'Error del servidor');

    S.items = S.items.filter(i => i.id !== id);
    renderLista();
    showToast('Ítem eliminado');
  } catch (err) {
    showToast('Error: ' + err.message);
  }
}

// === SECCIÓN: Limpiar comprados ===
// Qué hace: marca como borrados todos los ítems comprados y recarga la lista.
// Por qué: permite "limpiar el carrito" después de hacer las compras en un clic.
async function limpiarComprados() {
  const nComp = S.items.filter(i => esComprado(i) && !esBorrado(i)).length;
  if (nComp === 0) { showToast('No hay ítems comprados para limpiar'); return; }
  if (!confirm('¿Limpiar ' + nComp + ' ítem' + (nComp > 1 ? 's' : '') + ' comprado' + (nComp > 1 ? 's' : '') + '?')) return;

  try {
    const json = await apiFetch('limpiar', {});
    if (!json.ok) throw new Error(json.error || 'Error del servidor');
    showToast('✓ ' + (json.count || 0) + ' ítems limpiados');
    await fetchLista();
  } catch (err) {
    showToast('Error: ' + err.message);
  }
}

// === SECCIÓN: Enviar lista por email ===
// Qué hace: llama al endpoint enviar que manda email a los destinatarios configurados.
// Por qué: facilita ir al super con la lista en el celular sin acceder al dashboard.
async function enviarLista() {
  const nPend = S.items.filter(i => !esComprado(i) && !esBorrado(i)).length;
  if (nPend === 0) { showToast('No hay ítems pendientes para enviar'); return; }
  if (!confirm('¿Enviar lista de ' + nPend + ' ítem' + (nPend > 1 ? 's' : '') + ' por email?')) return;

  try {
    setStatus('loading', 'Enviando lista…');
    const json = await apiFetch('enviar', {});
    setStatus('');
    if (!json.ok) throw new Error(json.error || 'Error del servidor');
    showToast('✓ Lista enviada');
  } catch (err) {
    setStatus('');
    showToast('Error al enviar: ' + err.message);
  }
}

// DRAWER APPSHEET
// ═══════════════════════════════════════════════════════════════

let _drawerWidth = 420;

function initDrawerResize(drawerId, handleId) {
  if (window.innerWidth < 768) return;
  const drawer = document.getElementById(drawerId);
  const handle = document.getElementById(handleId);
  if (!drawer || !handle) return;

  drawer.style.width = _drawerWidth + 'px';
  if (handle._resizeInit) return;
  handle._resizeInit = true;

  handle.addEventListener('mousedown', e => {
    if (window.innerWidth < 768) return;
    e.preventDefault();
    handle.classList.add('dragging');
    drawer.style.transition = 'none';

    const onMove = ev => {
      const newW = window.innerWidth - ev.clientX;
      _drawerWidth = Math.max(280, Math.min(Math.floor(window.innerWidth * 0.82), newW));
      drawer.style.width = _drawerWidth + 'px';
    };
    const onUp = () => {
      handle.classList.remove('dragging');
      drawer.style.transition = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// === SECCIÓN: Drawer AppSheet ===
// Qué hace: abre el panel lateral con iframe de AppSheet para cargar ítems.
// Por qué: mismo patrón lazy que Finanzas e Inventario — el iframe se crea solo al primer clic.
// Cómo funciona: si APPSHEET_URL está configurada, inyecta el iframe una sola vez.
function openDrawer() {
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('drawer-overlay');
  const body    = document.getElementById('drawer-body');

  if (APPSHEET_URL) {
    if (!body.querySelector('iframe')) {
      const iframe       = document.createElement('iframe');
      iframe.className   = 'appsheet-frame';
      iframe.src         = APPSHEET_URL;
      iframe.allow       = 'camera; microphone';
      body.appendChild(iframe);
    }
  } else {
    if (!body.querySelector('.drawer-no-url')) {
      body.innerHTML = `
        <div class="drawer-no-url">
          Configurá la constante <code>APPSHEET_URL</code> en el código del dashboard
          para habilitar la carga de ítems desde AppSheet.
        </div>`;
    }
  }

  drawer.classList.add('open');
  overlay.classList.add('open');
  initDrawerResize('drawer', 'drawer-resize-handle');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// HELPERS
// ═══════════════════════════════════════════════════════════════

// Llama al API y retorna el JSON. Lanza error si la red falla.
async function apiFetch(action, params) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

// Checks de estado de un ítem
const esComprado = item => String(item.estado || '').toLowerCase() === 'comprado';
const esBorrado  = item => item.borrado === true || String(item.borrado).toUpperCase() === 'TRUE';
const esUrgente  = item => item.urgente === true || String(item.urgente).toUpperCase() === 'TRUE';

// Sanitiza texto antes de insertarlo en el DOM (evita XSS)
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Muestra/oculta la barra de estado (loading o error)
function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.className = 'status-bar' + (type ? ' ' + type : '');
  bar.textContent = msg || '';
}

// Muestra un toast temporario (2.5 segundos)
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
